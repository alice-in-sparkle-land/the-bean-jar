<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Bean Jar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f4f0;
      --bg-tertiary: #ece9e2;
      --text-primary: #1a1a18;
      --text-secondary: #6b6b65;
      --text-tertiary: #9e9e98;
      --border-light: rgba(0,0,0,0.10);
      --border-mid: rgba(0,0,0,0.15);
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1c1c1a;
        --bg-secondary: #242422;
        --bg-tertiary: #2e2e2b;
        --text-primary: #f0ede6;
        --text-secondary: #a09e98;
        --text-tertiary: #6b6b65;
        --border-light: rgba(255,255,255,0.07);
        --border-mid: rgba(255,255,255,0.13);
      }
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2.5rem 1rem 4rem;
    }

    #app { width: 100%; max-width: 700px; }

    .site-header { margin-bottom: 1.5rem; padding: 0 4px; }
    .site-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 500;
      color: var(--text-primary);
    }
    .site-header p {
      font-size: 13px;
      color: var(--text-secondary);
      font-style: italic;
      margin-top: 2px;
    }

    /* ── Tab bar ── */
    .tab-bar { display: flex; gap: 4px; margin-bottom: 0; }

    .tab-btn {
      flex: 1;
      padding: 10px 6px 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      border: 0.5px solid var(--border-mid);
      border-bottom: none;
      border-radius: var(--radius-md) var(--radius-md) 0 0;
      background: var(--bg-secondary);
      color: var(--text-tertiary);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      position: relative;
      bottom: -1px;
      transition: color 0.15s, background 0.15s;
    }
    .tab-btn .t-icon { font-size: 15px; }
    .tab-btn .t-name { font-size: 12px; }
    .tab-btn .t-count { font-size: 10px; color: var(--text-tertiary); font-weight: 400; }

    .tab-btn.active {
      background: var(--bg-primary);
      color: var(--text-primary);
      border-bottom: 1px solid var(--bg-primary);
      z-index: 2;
    }
    .tab-btn .t-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: var(--radius-md) var(--radius-md) 0 0;
      display: none;
    }
    .tab-btn.active .t-bar { display: block; }

    /* ── Panel ── */
    .panel {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-mid);
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      padding: 2rem 1.75rem 2.5rem;
      position: relative;
      z-index: 1;
    }

    /* ── Encouragement ── */
    .encouragement {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      background: var(--bg-secondary);
      font-size: 13px;
      font-style: italic;
      color: var(--text-secondary);
      line-height: 1.55;
      margin-bottom: 1.75rem;
      min-height: 46px;
    }
    .encouragement .qmark {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      line-height: 0;
      padding-top: 14px;
      flex-shrink: 0;
    }
    .quote-text { transition: opacity 0.35s; }

    /* ── Jars ── */
    .jars-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 1.5rem;
    }
    .jar-section { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .jar-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-secondary); }
    .jar-wrap { position: relative; width: 130px; }
    svg.jar { width: 130px; height: 178px; overflow: visible; }
    .counter-badge { font-size: 22px; font-weight: 500; color: var(--text-primary); }
    .jar-count { font-size: 11px; color: var(--text-tertiary); }

    /* ── Progress ── */
    .progress-bar-wrap { height: 5px; background: var(--bg-secondary); border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
    .progress-bar { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
    .progress-label { font-size: 11px; color: var(--text-tertiary); text-align: right; margin-bottom: 1.5rem; }

    /* ── Input ── */
    .input-row { display: flex; gap: 8px; margin-bottom: 1.75rem; }
    .input-row input {
      flex: 1;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 0 14px;
      height: 40px;
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md);
      background: var(--bg-primary);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .input-row input::placeholder { color: var(--text-tertiary); }
    .input-row button {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 0 18px;
      height: 40px;
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      white-space: nowrap;
      transition: filter 0.15s, transform 0.1s;
    }
    .input-row button:hover { filter: brightness(0.86); }
    .input-row button:active { transform: scale(0.97); }

    /* ── Log ── */
    .log-section { border-top: 0.5px solid var(--border-light); padding-top: 1.1rem; }
    .log-title { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 10px; }
    .log-empty { font-size: 13px; color: var(--text-tertiary); font-style: italic; }
    .log-list { display: flex; flex-direction: column; gap: 7px; max-height: 260px; overflow-y: auto; padding-right: 2px; }
    .log-list::-webkit-scrollbar { width: 3px; }
    .log-list::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }
    .log-item { display: flex; align-items: baseline; gap: 10px; padding: 7px 11px; background: var(--bg-secondary); border-radius: var(--radius-md); border: 0.5px solid var(--border-light); }
    .log-num { font-size: 11px; font-weight: 500; min-width: 28px; flex-shrink: 0; }
    .log-text { font-size: 13px; color: var(--text-primary); flex: 1; }
    .log-time { font-size: 11px; color: var(--text-tertiary); flex-shrink: 0; }

    /* ── Bean particle ── */
    .bean-particle {
      position: absolute;
      width: 9px; height: 7px;
      border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
      pointer-events: none;
      animation: fly 0.75s ease-out forwards;
    }
    @keyframes fly {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx),var(--ty)) scale(0.3); opacity: 0; }
    }

    .reset-btn {
      margin-top: 1.25rem;
      background: none;
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md);
      padding: 5px 13px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      color: var(--text-tertiary);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .reset-btn:hover { color: #c0392b; border-color: #c0392b; }

    @media (max-width: 480px) {
      .panel { padding: 1.25rem 1rem 1.75rem; }
      .tab-btn .t-name { font-size: 11px; }
      .jar-wrap { width: 105px; }
      svg.jar { width: 105px; height: 145px; }
    }
  </style>
</head>
<body>
<div id="app">
  <div class="site-header">
    <h1>The Bean Jar</h1>
    <p>1000 chances to get it wrong — and learn faster</p>
  </div>
  <div class="tab-bar" id="tab-bar"></div>
  <div class="panel" id="panel"></div>
</div>

<script>
const TOTAL = 1000;

const TABS = [
  {
    id: 'antifraud',
    label: 'Anti-fraud',
    icon: '🛡️',
    accent: '#185FA5',
    beanLeft: '#378ADD',
    quotes: [
      "Every false positive you investigate sharpens your instinct for the real ones.",
      "The rule you tuned wrong today is the insight you'll operationalize next quarter.",
      "Fraud patterns only reveal themselves to people willing to look at enough noise.",
      "A missed case is data. Analyze it without shame — it's where the growth is.",
      "The analysts who catch the most fraud studied their misses the hardest.",
      "Wrong hypotheses aren't failures. They're the elimination rounds of expertise.",
      "Each escalation that didn't pan out is a calibration, not a mistake.",
      "Master-level detection comes from thousands of imperfect judgment calls, not perfect ones.",
      "Every edge case you misclassify today teaches you the boundary for tomorrow."
    ]
  },
  {
    id: 'lyre',
    label: 'Lyre Harp',
    icon: '🎵',
    accent: '#534AB7',
    beanLeft: '#7F77DD',
    quotes: [
      "Every wrong note is your fingers learning where the right one lives.",
      "The musician who never plays out of tune is the one who never plays.",
      "Stumbling through a phrase slowly is how your hands eventually play it fast.",
      "Music forgives every mistake the moment you keep going.",
      "The piece that feels impossible today is the one you'll play from memory in a year.",
      "Even Ghibli melodies started as someone playing the wrong string first.",
      "Practice is just organized permission to be imperfect repeatedly.",
      "Your 16 strings don't judge. They only wait for you to try again.",
      "The notes you miss teach your hands more than the ones you hit."
    ]
  },
  {
    id: 'income',
    label: '2nd Income',
    icon: '🌱',
    accent: '#3B6D11',
    beanLeft: '#639922',
    quotes: [
      "The post no one reads today teaches you what your next one needs.",
      "Every idea you test and discard brings you closer to the one that compounds.",
      "Building a second income is a long experiment — treat every flop as a data point.",
      "Ship it imperfect. Perfection is what keeps most people permanently unpublished.",
      "Audiences are built by people willing to look clumsy in public for a while.",
      "The affiliate link that earns nothing still showed you something about your audience.",
      "Done and out beats polished and sitting in drafts every single time.",
      "The writers who earn are the ones who kept publishing after the silence.",
      "Your first hundred attempts are tuition. Pay them gladly."
    ]
  }
];

let states = {};
TABS.forEach(t => { states[t.id] = { count: 0, log: [] }; });
let activeId = TABS[0].id;

function loadAll() {
  try {
    const s = localStorage.getItem('bean_jar_tabs_v2');
    if (s) {
      const loaded = JSON.parse(s);
      TABS.forEach(t => { if (loaded[t.id]) states[t.id] = loaded[t.id]; });
    }
  } catch(e) {}
}

function saveAll() {
  try { localStorage.setItem('bean_jar_tabs_v2', JSON.stringify(states)); } catch(e) {}
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function tab() { return TABS.find(t => t.id === activeId); }

/* ── Render tab bar ── */
function renderBar() {
  document.getElementById('tab-bar').innerHTML = TABS.map(t => {
    const active = t.id === activeId;
    return `<button class="tab-btn${active?' active':''}" onclick="switchTab('${t.id}')">
      <span class="t-bar" style="background:${t.accent}"></span>
      <span class="t-icon">${t.icon}</span>
      <span class="t-name" style="${active?'color:'+t.accent:''}">${t.label}</span>
      <span class="t-count">${states[t.id].count}/${TOTAL}</span>
    </button>`;
  }).join('');
}

/* ── Render panel ── */
function renderPanel() {
  const t = tab();
  const s = states[t.id];
  const pct = (Math.min(s.count, TOTAL) / TOTAL * 100).toFixed(1);
  const q = t.quotes[Math.floor(Math.random() * t.quotes.length)];

  const logHtml = s.log.length === 0
    ? '<p class="log-empty">No mistakes yet — go out and make some!</p>'
    : `<div class="log-list">${s.log.slice().reverse().map((e,i)=>{
        const n = s.log.length - i;
        return `<div class="log-item">
          <span class="log-num" style="color:${t.accent}">#${n}</span>
          <span class="log-text">${esc(e.text)}</span>
          <span class="log-time">${e.time}</span>
        </div>`;
      }).join('')}</div>`;

  document.getElementById('panel').innerHTML = `
    <div class="encouragement" style="border-left:3px solid ${t.accent}">
      <span class="qmark" style="color:${t.accent}">"</span>
      <span class="quote-text" id="qt">${q}</span>
    </div>

    <div class="jars-row">
      <div class="jar-section">
        <span class="jar-label">Potential mistakes</span>
        <div class="jar-wrap" id="jw1">
          <svg class="jar" id="j1" viewBox="0 0 140 190"></svg>
        </div>
        <span class="counter-badge" id="c1">${Math.max(0,TOTAL-s.count)}</span>
        <span class="jar-count">beans remaining</span>
      </div>
      <div class="jar-section">
        <span class="jar-label">Mistakes made</span>
        <div class="jar-wrap" id="jw2">
          <svg class="jar" id="j2" viewBox="0 0 140 190"></svg>
        </div>
        <span class="counter-badge" id="c2">${s.count}</span>
        <span class="jar-count">lessons earned</span>
      </div>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar" style="width:${pct}%;background:${t.accent}"></div>
    </div>
    <p class="progress-label">${s.count} / ${TOTAL} mistakes embraced</p>

    <div class="input-row">
      <input type="text" id="mi" placeholder="Name your mistake…" maxlength="120"
        onkeydown="if(event.key==='Enter')addMistake()" />
      <button onclick="addMistake()" style="background:${t.accent}">+ I did it</button>
    </div>

    <div class="log-section">
      <div class="log-title">Mistake log</div>
      <div id="log-area">${logHtml}</div>
    </div>

    <button class="reset-btn" onclick="resetTab()">Reset this jar</button>`;

  drawJar(document.getElementById('j1'), Math.max(0,(TOTAL-s.count)/TOTAL), t.beanLeft, 'aa');
  drawJar(document.getElementById('j2'), Math.min(1,s.count/TOTAL), t.accent, 'bb');
}

/* ── Draw jar SVG ── */
function drawJar(el, fill, color, uid) {
  if (!el) return;
  const jX=10,jW=120,jH=140,jY=38,lidH=18,lidY=jY-lidH+2,ni=12;
  const max=60, n=Math.round(fill*max);
  const dk=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const jf=dk?'#242422':'#f5f4f0', js=dk?'rgba(255,255,255,0.13)':'rgba(0,0,0,0.13)', lf=dk?'#2e2e2b':'#ece9e2';
  let h=`<clipPath id="c${uid}"><rect x="${jX+2}" y="${jY+2}" width="${jW-4}" height="${jH-4}" rx="8"/></clipPath>`;
  h+=`<rect x="${jX}" y="${jY}" width="${jW}" height="${jH}" rx="10" fill="${jf}" stroke="${js}" stroke-width="1"/>`;
  if (n>0) {
    const cols=8,rows=Math.ceil(max/cols),bw=11,bh=8,gx=4,gy=5;
    const gW=cols*bw+(cols-1)*gx, sx=jX+(jW-gW)/2;
    let p=0;
    for(let r=rows-1;r>=0&&p<n;r--) for(let c=0;c<cols&&p<n;c++,p++) {
      const bx=sx+c*(bw+gx), by=jY+jH-bh-8-r*(bh+gy);
      const wb=(Math.sin(r*7+c*13)*3).toFixed(1);
      const cx=(bx+bw/2).toFixed(1),cy=(by+bh/2).toFixed(1);
      h+=`<ellipse cx="${cx}" cy="${cy}" rx="${(bw/2).toFixed(1)}" ry="${(bh/2).toFixed(1)}" fill="${color}" opacity="0.88" transform="rotate(${wb},${cx},${cy})" clip-path="url(#c${uid})"/>`;
    }
  }
  h+=`<rect x="${jX+ni}" y="${lidY}" width="${jW-ni*2}" height="${lidH}" rx="5" fill="${lf}" stroke="${js}" stroke-width="1"/>`;
  h+=`<rect x="${jX}" y="${jY}" width="${jW}" height="${jH}" rx="10" fill="none" stroke="${js}" stroke-width="1.5"/>`;
  el.innerHTML=h;
}

/* ── Actions ── */
function switchTab(id) {
  activeId = id;
  renderBar();
  renderPanel();
}

function addMistake() {
  const inp = document.getElementById('mi');
  if (!inp) return;
  const text = inp.value.trim();
  const s = states[activeId];
  if (!text || s.count >= TOTAL) { inp.focus(); return; }
  s.count++;
  const time = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  s.log.push({ text, time });
  saveAll();
  inp.value = '';
  spawnBeans();
  renderBar();
  renderPanel();
  setTimeout(()=>{ const i=document.getElementById('mi'); if(i)i.focus(); },40);
}

function spawnBeans() {
  const w1=document.getElementById('jw1'), w2=document.getElementById('jw2');
  if (!w1||!w2) return;
  const r1=w1.getBoundingClientRect(), r2=w2.getBoundingClientRect();
  const dx=r2.left-r1.left, dy=r2.top-r1.top;
  const color = tab().beanLeft;
  for(let i=0;i<4;i++) setTimeout(()=>{
    const p=document.createElement('div');
    p.className='bean-particle';
    p.style.background=color;
    p.style.left=(50+Math.random()*40)+'px';
    p.style.top=(70+Math.random()*40)+'px';
    p.style.setProperty('--tx',(dx+Math.random()*20-10)+'px');
    p.style.setProperty('--ty',(dy+Math.random()*20-6)+'px');
    w1.appendChild(p);
    setTimeout(()=>p.remove(),900);
  }, i*70);
}

function resetTab() {
  if (!confirm(`Reset all progress for "${tab().label}"?`)) return;
  states[activeId] = { count:0, log:[] };
  saveAll();
  renderBar();
  renderPanel();
}

window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change', ()=>{ renderBar(); renderPanel(); });

loadAll();
renderBar();
renderPanel();
</script>
</body>
</html>
