<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Bean Jar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ece9e2;
      --bg1: #ffffff;
      --bg2: #f5f4f0;
      --bg3: #ece9e2;
      --t1: #1a1a18;
      --t2: #6b6b65;
      --t3: #9e9e98;
      --bl: rgba(0,0,0,0.10);
      --bm: rgba(0,0,0,0.15);
      --rm: 8px;
      --rl: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #2e2e2b;
        --bg1: #1c1c1a;
        --bg2: #242422;
        --bg3: #2e2e2b;
        --t1: #f0ede6;
        --t2: #a09e98;
        --t3: #6b6b65;
        --bl: rgba(255,255,255,0.07);
        --bm: rgba(255,255,255,0.13);
      }
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2.5rem 1rem 4rem;
    }

    #app { width: 100%; max-width: 700px; }

    /* ── Header ── */
    .site-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      padding: 0 2px;
    }
    .site-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 500;
      color: var(--t1);
    }
    .site-header p { font-size: 13px; color: var(--t2); font-style: italic; margin-top: 2px; }

    /* ── Gear button ── */
    #gear-btn {
      background: none;
      border: 0.5px solid var(--bm);
      border-radius: var(--rm);
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 15px;
      color: var(--t3);
      flex-shrink: 0;
      margin-top: 4px;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    #gear-btn:hover { color: var(--t1); border-color: var(--t2); background: var(--bg2); }
    #gear-btn.active { color: var(--t1); border-color: var(--t2); background: var(--bg2); }

    /* ── Tab bar ── */
    .tab-row { display: flex; align-items: flex-end; gap: 4px; margin-bottom: 0; }
    .tab-bar { display: flex; gap: 4px; flex: 1; min-width: 0; }

    .tab-btn {
      flex: 1; min-width: 0;
      padding: 9px 6px 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 500;
      border: 0.5px solid var(--bm);
      border-bottom: none;
      border-radius: var(--rm) var(--rm) 0 0;
      background: var(--bg2);
      color: var(--t3);
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      position: relative; bottom: -1px;
      transition: color 0.15s, background 0.15s;
      overflow: hidden;
    }
    .tab-btn .t-icon { font-size: 14px; }
    .tab-btn .t-name { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
    .tab-btn .t-count { font-size: 10px; color: var(--t3); font-weight: 400; }
    .tab-btn .t-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: var(--rm) var(--rm) 0 0; display: none; }
    .tab-btn.active { background: var(--bg1); color: var(--t1); border-bottom: 1px solid var(--bg1); z-index: 2; }
    .tab-btn.active .t-bar { display: block; }

    /* ── Panel ── */
    .panel {
      background: var(--bg1);
      border: 0.5px solid var(--bm);
      border-radius: 0 0 var(--rl) var(--rl);
      padding: 2rem 1.75rem 2.5rem;
      position: relative; z-index: 1;
    }

    /* ── Settings drawer ── */
    #settings-drawer {
      display: none;
      background: var(--bg1);
      border: 0.5px solid var(--bm);
      border-radius: var(--rl);
      padding: 1.5rem;
      margin-bottom: 12px;
      position: relative; z-index: 10;
    }
    #settings-drawer.open { display: block; }

    .drawer-title {
      font-size: 12px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--t2); margin-bottom: 1rem;
    }

    /* tab list in drawer */
    #tab-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.25rem; }

    .tab-row-edit {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px;
      background: var(--bg2);
      border: 0.5px solid var(--bl);
      border-radius: var(--rm);
    }
    .tab-row-edit .drag-handle {
      cursor: grab; color: var(--t3); font-size: 14px; flex-shrink: 0;
      user-select: none;
    }
    .tab-row-edit .emoji-inp {
      width: 38px; text-align: center;
      font-size: 16px; background: none;
      border: 0.5px solid var(--bl); border-radius: 6px;
      padding: 3px 2px; color: var(--t1);
      font-family: inherit; flex-shrink: 0;
    }
    .tab-row-edit .name-inp {
      flex: 1; font-family: 'DM Sans', sans-serif;
      font-size: 13px; padding: 4px 9px; height: 30px;
      border: 0.5px solid var(--bm); border-radius: 6px;
      background: var(--bg1); color: var(--t1); outline: none;
    }
    .tab-row-edit .name-inp:focus { border-color: var(--accent-cur, #888); }

    .color-swatches { display: flex; gap: 5px; flex-shrink: 0; }
    .swatch {
      width: 18px; height: 18px; border-radius: 50%;
      cursor: pointer; border: 2px solid transparent;
      transition: border-color 0.1s, transform 0.1s;
      flex-shrink: 0;
    }
    .swatch.selected { border-color: var(--t1); transform: scale(1.15); }

    .del-btn {
      background: none; border: none; cursor: pointer;
      color: var(--t3); font-size: 16px; padding: 2px 4px;
      border-radius: 4px; flex-shrink: 0;
      transition: color 0.15s;
      line-height: 1;
    }
    .del-btn:hover { color: #c0392b; }

    .add-tab-btn {
      width: 100%;
      padding: 7px;
      background: none;
      border: 0.5px dashed var(--bm);
      border-radius: var(--rm);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; color: var(--t2);
      cursor: pointer; transition: color 0.15s, border-color 0.15s;
    }
    .add-tab-btn:hover { color: var(--t1); border-color: var(--t1); }

    .drawer-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1rem; }
    .btn-save {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 500;
      padding: 6px 16px; border: none; border-radius: var(--rm);
      background: var(--t1); color: var(--bg1); cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-save:hover { opacity: 0.8; }
    .btn-cancel {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; padding: 6px 14px;
      border: 0.5px solid var(--bm); border-radius: var(--rm);
      background: none; color: var(--t2); cursor: pointer;
    }

    /* ── Encouragement ── */
    .encouragement {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px;
      border-radius: 0 var(--rm) var(--rm) 0;
      background: var(--bg2);
      font-size: 13px; font-style: italic; color: var(--t2);
      line-height: 1.55; margin-bottom: 1.75rem; min-height: 46px;
    }
    .encouragement .qmark {
      font-family: 'Playfair Display', serif;
      font-size: 34px; line-height: 0;
      padding-top: 14px; flex-shrink: 0;
    }
    .quote-text { transition: opacity 0.35s; }

    /* ── Jars ── */
    .jars-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 1.5rem; }
    .jar-section { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .jar-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--t2); }
    .jar-wrap { position: relative; width: 130px; }
    svg.jar { width: 130px; height: 178px; overflow: visible; }
    .counter-badge { font-size: 22px; font-weight: 500; color: var(--t1); }
    .jar-count { font-size: 11px; color: var(--t3); }

    /* ── Progress ── */
    .progress-bar-wrap { height: 5px; background: var(--bg2); border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
    .progress-bar { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
    .progress-label { font-size: 11px; color: var(--t3); text-align: right; margin-bottom: 1.5rem; }

    /* ── Input ── */
    .input-row { display: flex; gap: 8px; margin-bottom: 1.75rem; }
    .input-row input {
      flex: 1; font-family: 'DM Sans', sans-serif; font-size: 14px;
      padding: 0 14px; height: 40px;
      border: 0.5px solid var(--bm); border-radius: var(--rm);
      background: var(--bg1); color: var(--t1); outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .input-row input::placeholder { color: var(--t3); }
    .input-row button {
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      padding: 0 18px; height: 40px; color: #fff;
      border: none; border-radius: var(--rm); cursor: pointer;
      white-space: nowrap; transition: filter 0.15s, transform 0.1s;
    }
    .input-row button:hover { filter: brightness(0.86); }
    .input-row button:active { transform: scale(0.97); }

    /* ── Log ── */
    .log-section { border-top: 0.5px solid var(--bl); padding-top: 1.1rem; }
    .log-title { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--t2); margin-bottom: 10px; }
    .log-empty { font-size: 13px; color: var(--t3); font-style: italic; }
    .log-list { display: flex; flex-direction: column; gap: 7px; max-height: 260px; overflow-y: auto; padding-right: 2px; }
    .log-list::-webkit-scrollbar { width: 3px; }
    .log-list::-webkit-scrollbar-thumb { background: var(--bm); border-radius: 2px; }
    .log-item { display: flex; align-items: baseline; gap: 10px; padding: 7px 11px; background: var(--bg2); border-radius: var(--rm); border: 0.5px solid var(--bl); }
    .log-num { font-size: 11px; font-weight: 500; min-width: 28px; flex-shrink: 0; }
    .log-text { font-size: 13px; color: var(--t1); flex: 1; }
    .log-time { font-size: 11px; color: var(--t3); flex-shrink: 0; }

    /* ── Bean particle ── */
    .bean-particle {
      position: absolute; width: 9px; height: 7px;
      border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
      pointer-events: none; animation: fly 0.75s ease-out forwards;
    }
    @keyframes fly {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx),var(--ty)) scale(0.3); opacity: 0; }
    }

    /* ── Transfer section ── */
    .transfer-section {
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 0.5px solid var(--bl);
    }
    .transfer-title {
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--t2); margin-bottom: 10px;
    }
    .transfer-row {
      display: flex; align-items: center; gap: 0;
    }
    .transfer-card {
      flex: 1; display: flex; flex-direction: column; gap: 7px;
      align-items: center; text-align: center; padding: 4px 8px;
    }
    .transfer-label { font-size: 12px; color: var(--t2); }
    .transfer-divider {
      width: 0.5px; height: 48px; background: var(--bl); flex-shrink: 0; margin: 0 4px;
    }
    .btn-transfer {
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
      padding: 6px 14px; border: 0.5px solid var(--bm); border-radius: var(--rm);
      background: var(--bg2); color: var(--t1); cursor: pointer;
      transition: background 0.15s, border-color 0.15s; white-space: nowrap;
    }
    .btn-transfer:hover { background: var(--bg3); border-color: var(--t2); }
    .transfer-msg {
      font-size: 12px; text-align: center; margin-top: 8px;
      min-height: 18px; transition: opacity 0.3s;
    }
    .transfer-msg.ok  { color: #3B6D11; }
    .transfer-msg.err { color: #c0392b; }

    .reset-btn {
      margin-top: 1.25rem; background: none;
      border: 0.5px solid var(--bl); border-radius: var(--rm);
      padding: 5px 13px; font-family: 'DM Sans', sans-serif;
      font-size: 11px; color: var(--t3); cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .reset-btn:hover { color: #c0392b; border-color: #c0392b; }

    @media (max-width: 480px) {
      .panel { padding: 1.25rem 1rem 1.75rem; }
      .tab-btn .t-name { font-size: 10px; }
      .jar-wrap { width: 105px; }
      svg.jar { width: 105px; height: 145px; }
    }
  </style>
</head>
<body>
<div id="app">
  <div class="site-header">
    <div>
      <h1>The Bean Jar</h1>
      <p>1000 chances to get it wrong — and learn faster</p>
    </div>
    <button id="gear-btn" onclick="toggleSettings()" title="Manage tabs">⚙️</button>
  </div>

  <!-- Settings drawer -->
  <div id="settings-drawer">
    <div class="drawer-title">Manage tabs</div>
    <div id="tab-list"></div>
    <button class="add-tab-btn" onclick="addTabRow()">+ Add a new tab</button>
    <div class="drawer-actions">
      <button class="btn-cancel" onclick="closeSettings()">Cancel</button>
      <button class="btn-save" onclick="saveSettings()">Save</button>
    </div>

    <div class="transfer-section">
      <div class="transfer-title">Transfer data</div>
      <div class="transfer-row">
        <div class="transfer-card">
          <div class="transfer-label">Moving to a new device?</div>
          <button class="btn-transfer" onclick="exportData()">⬇ Export backup</button>
        </div>
        <div class="transfer-divider"></div>
        <div class="transfer-card">
          <div class="transfer-label">Restoring from a backup?</div>
          <button class="btn-transfer" onclick="document.getElementById('import-file').click()">⬆ Import backup</button>
          <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)" />
        </div>
      </div>
      <p id="transfer-msg" class="transfer-msg"></p>
    </div>
  </div>

  <div class="tab-row">
    <div class="tab-bar" id="tab-bar"></div>
  </div>
  <div class="panel" id="panel"></div>
</div>

<script>
const TOTAL = 1000;
const PALETTE = ['#185FA5','#534AB7','#3B6D11','#D85A30','#993556','#0F6E56','#854F0B','#444441'];
const PALETTE_LABELS = ['Blue','Purple','Green','Coral','Pink','Teal','Amber','Gray'];

const DEFAULT_QUOTES = [
  "Every mistake is proof you are attempting something. That is already brave.",
  "The master has failed more times than the beginner has even tried.",
  "Trying imperfectly beats planning perfectly every single time.",
  "Permission granted: mess it up gloriously, then do it again.",
  "Each bean you move is a scar that becomes a skill.",
  "The fastest learners are the ones least afraid of looking foolish."
];

const TAB_QUOTES = {
  antifraud: [
    "Every false positive you investigate sharpens your instinct for the real ones.",
    "The rule you tuned wrong today is the insight you'll operationalize next quarter.",
    "Fraud patterns only reveal themselves to people willing to look at enough noise.",
    "A missed case is data. Analyze it without shame — it's where the growth is.",
    "Wrong hypotheses aren't failures. They're the elimination rounds of expertise.",
    "Master-level detection comes from thousands of imperfect judgment calls.",
    "Each escalation that didn't pan out is a calibration, not a mistake."
  ],
  lyre: [
    "Every wrong note is your fingers learning where the right one lives.",
    "The musician who never plays out of tune is the one who never plays.",
    "Stumbling through a phrase slowly is how your hands eventually play it fast.",
    "Music forgives every mistake the moment you keep going.",
    "Even Ghibli melodies started as someone playing the wrong string first.",
    "Practice is organized permission to be imperfect repeatedly.",
    "Your strings don't judge. They only wait for you to try again."
  ],
  income: [
    "The post no one reads today teaches you what your next one needs.",
    "Every idea you test and discard brings you closer to the one that compounds.",
    "Ship it imperfect. Perfection keeps most people permanently unpublished.",
    "Audiences are built by people willing to look clumsy in public for a while.",
    "Done and out beats polished and sitting in drafts every single time.",
    "The writers who earn are the ones who kept publishing after the silence.",
    "Your first hundred attempts are tuition. Pay them gladly."
  ]
};

/* ── Default config ── */
const DEFAULT_TABS = [
  { id: 'antifraud', label: 'Anti-fraud',  icon: '🛡️', accent: '#185FA5' },
  { id: 'lyre',      label: 'Lyre Harp',   icon: '🎵', accent: '#534AB7' },
  { id: 'income',    label: '2nd Income',  icon: '🌱', accent: '#3B6D11' }
];

/* ── State ── */
let tabs   = [];   // [{id, label, icon, accent}]
let states = {};   // id -> {count, log}
let activeId = '';
let drawerOpen = false;
let dragSrc = null;
let draft  = [];   // working copy inside drawer — never touches tabs[] until Save

/* ── Persist ── */
function load() {
  try {
    const raw = localStorage.getItem('bj_v3');
    if (raw) {
      const d = JSON.parse(raw);
      tabs   = d.tabs   || DEFAULT_TABS;
      states = d.states || {};
    } else {
      tabs = DEFAULT_TABS;
    }
  } catch(e) { tabs = DEFAULT_TABS; }
  tabs.forEach(t => { if (!states[t.id]) states[t.id] = { count:0, log:[] }; });
  if (!activeId || !tabs.find(t=>t.id===activeId)) activeId = tabs[0]?.id || '';
}

function save() {
  try { localStorage.setItem('bj_v3', JSON.stringify({ tabs, states })); } catch(e) {}
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function uid() { return 't' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function getQuotes(id) { return TAB_QUOTES[id] || DEFAULT_QUOTES; }

/* ── Render tab bar ── */
function renderBar() {
  document.getElementById('tab-bar').innerHTML = tabs.map(t => {
    const active = t.id === activeId;
    return `<button class="tab-btn${active?' active':''}" onclick="switchTab('${t.id}')">
      <span class="t-bar" style="background:${t.accent}"></span>
      <span class="t-icon">${t.icon}</span>
      <span class="t-name" style="${active?'color:'+t.accent:''}">${esc(t.label)}</span>
      <span class="t-count">${(states[t.id]||{count:0}).count}/${TOTAL}</span>
    </button>`;
  }).join('');
}

/* ── Render panel ── */
function renderPanel() {
  const t = tabs.find(x=>x.id===activeId);
  if (!t) { document.getElementById('panel').innerHTML = '<p style="color:var(--t3);font-size:13px;padding:1rem">No tabs yet. Add one via ⚙️</p>'; return; }
  const s = states[t.id] || { count:0, log:[] };
  const pct = (Math.min(s.count,TOTAL)/TOTAL*100).toFixed(1);
  const qs = getQuotes(t.id);
  const q = qs[Math.floor(Math.random()*qs.length)];

  const logHtml = s.log.length === 0
    ? '<p class="log-empty">No mistakes yet — go out and make some!</p>'
    : `<div class="log-list">${s.log.slice().reverse().map((e,i)=>{
        const n = s.log.length - i;
        return `<div class="log-item">
          <span class="log-num" style="color:${t.accent}">#${n}</span>
          <span class="log-text">${esc(e.text)}</span>
          <span class="log-time">${e.time}</span>
        </div>`;
      }).join('')}</div>`;

  document.getElementById('panel').innerHTML = `
    <div class="encouragement" style="border-left:3px solid ${t.accent}">
      <span class="qmark" style="color:${t.accent}">"</span>
      <span class="quote-text" id="qt">${q}</span>
    </div>
    <div class="jars-row">
      <div class="jar-section">
        <span class="jar-label">Potential mistakes</span>
        <div class="jar-wrap" id="jw1"><svg class="jar" id="j1" viewBox="0 0 140 190"></svg></div>
        <span class="counter-badge" id="c1">${Math.max(0,TOTAL-s.count)}</span>
        <span class="jar-count">beans remaining</span>
      </div>
      <div class="jar-section">
        <span class="jar-label">Mistakes made</span>
        <div class="jar-wrap" id="jw2"><svg class="jar" id="j2" viewBox="0 0 140 190"></svg></div>
        <span class="counter-badge" id="c2">${s.count}</span>
        <span class="jar-count">lessons earned</span>
      </div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" style="width:${pct}%;background:${t.accent}"></div>
    </div>
    <p class="progress-label">${s.count} / ${TOTAL} mistakes embraced</p>
    <div class="input-row">
      <input type="text" id="mi" placeholder="Name your mistake…" maxlength="120"
        onkeydown="if(event.key==='Enter')addMistake()" />
      <button onclick="addMistake()" style="background:${t.accent}">+ I did it</button>
    </div>
    <div class="log-section">
      <div class="log-title">Mistake log</div>
      <div id="log-area">${logHtml}</div>
    </div>
    <button class="reset-btn" onclick="resetTab()">Reset this jar</button>`;

  drawJar(document.getElementById('j1'), Math.max(0,(TOTAL-s.count)/TOTAL), lighten(t.accent), 'aa');
  drawJar(document.getElementById('j2'), Math.min(1,s.count/TOTAL), t.accent, 'bb');
}

function lighten(hex) {
  /* return a slightly lighter / more transparent version for left jar */
  return hex;
}

/* ── Draw SVG jar ── */
function drawJar(el, fill, color, uid) {
  if (!el) return;
  const jX=10,jW=120,jH=140,jY=38,lidH=18,lidY=jY-lidH+2,ni=12;
  const max=60, n=Math.round(fill*max);
  const dk=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const jf=dk?'#242422':'#f5f4f0', js=dk?'rgba(255,255,255,0.13)':'rgba(0,0,0,0.13)', lf=dk?'#2e2e2b':'#ece9e2';
  let h=`<clipPath id="c${uid}"><rect x="${jX+2}" y="${jY+2}" width="${jW-4}" height="${jH-4}" rx="8"/></clipPath>`;
  h+=`<rect x="${jX}" y="${jY}" width="${jW}" height="${jH}" rx="10" fill="${jf}" stroke="${js}" stroke-width="1"/>`;
  if (n>0) {
    const cols=8,rows=Math.ceil(max/cols),bw=11,bh=8,gx=4,gy=5;
    const gW=cols*bw+(cols-1)*gx, sx=jX+(jW-gW)/2;
    let p=0;
    for(let r=rows-1;r>=0&&p<n;r--) for(let c=0;c<cols&&p<n;c++,p++){
      const bx=sx+c*(bw+gx), by=jY+jH-bh-8-r*(bh+gy);
      const wb=(Math.sin(r*7+c*13)*3).toFixed(1);
      const cx=(bx+bw/2).toFixed(1),cy=(by+bh/2).toFixed(1);
      h+=`<ellipse cx="${cx}" cy="${cy}" rx="${(bw/2).toFixed(1)}" ry="${(bh/2).toFixed(1)}" fill="${color}" opacity="0.88" transform="rotate(${wb},${cx},${cy})" clip-path="url(#c${uid})"/>`;
    }
  }
  h+=`<rect x="${jX+ni}" y="${lidY}" width="${jW-ni*2}" height="${lidH}" rx="5" fill="${lf}" stroke="${js}" stroke-width="1"/>`;
  h+=`<rect x="${jX}" y="${jY}" width="${jW}" height="${jH}" rx="10" fill="none" stroke="${js}" stroke-width="1.5"/>`;
  el.innerHTML=h;
}

/* ── Main actions ── */
function switchTab(id) { activeId=id; renderBar(); renderPanel(); }

function addMistake() {
  const inp=document.getElementById('mi');
  if (!inp) return;
  const text=inp.value.trim();
  const s=states[activeId];
  if (!text||!s||s.count>=TOTAL) { inp.focus(); return; }
  s.count++;
  const time=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  s.log.push({text,time});
  save();
  inp.value='';
  spawnBeans();
  renderBar(); renderPanel();
  setTimeout(()=>{ const i=document.getElementById('mi'); if(i)i.focus(); },40);
}

function spawnBeans() {
  const w1=document.getElementById('jw1'), w2=document.getElementById('jw2');
  if (!w1||!w2) return;
  const r1=w1.getBoundingClientRect(), r2=w2.getBoundingClientRect();
  const dx=r2.left-r1.left, dy=r2.top-r1.top;
  const t=tabs.find(x=>x.id===activeId);
  const color=t?t.accent:'#888';
  for(let i=0;i<4;i++) setTimeout(()=>{
    const p=document.createElement('div');
    p.className='bean-particle'; p.style.background=color;
    p.style.left=(50+Math.random()*40)+'px';
    p.style.top=(70+Math.random()*40)+'px';
    p.style.setProperty('--tx',(dx+Math.random()*20-10)+'px');
    p.style.setProperty('--ty',(dy+Math.random()*20-6)+'px');
    w1.appendChild(p); setTimeout(()=>p.remove(),900);
  },i*70);
}

function resetTab() {
  const t=tabs.find(x=>x.id===activeId);
  if (!t||!confirm(`Reset all progress for "${t.label}"?`)) return;
  states[activeId]={count:0,log:[]};
  save(); renderBar(); renderPanel();
}

/* ── Settings drawer ── */
function toggleSettings() {
  drawerOpen = !drawerOpen;
  document.getElementById('gear-btn').classList.toggle('active', drawerOpen);
  if (drawerOpen) openSettings(); else closeSettings();
}

function openSettings() {
  drawerOpen = true;
  // deep-clone tabs into draft so edits never touch the live array
  draft = tabs.map(t => Object.assign({}, t));
  document.getElementById('gear-btn').classList.add('active');
  document.getElementById('settings-drawer').classList.add('open');
  renderTabList();
}

function closeSettings() {
  drawerOpen = false;
  document.getElementById('gear-btn').classList.remove('active');
  document.getElementById('settings-drawer').classList.remove('open');
}

/* render the editable tab list — operates on draft[], never tabs[] */
function renderTabList() {
  const list = document.getElementById('tab-list');
  list.innerHTML = draft.map((t, i) => `
    <div class="tab-row-edit" draggable="true" data-id="${t.id}"
      ondragstart="dragStart(event,${i})" ondragover="dragOver(event,${i})"
      ondrop="dragDrop(event,${i})" ondragend="dragEnd()">
      <span class="drag-handle" title="Drag to reorder">⠿</span>
      <input class="emoji-inp" type="text" maxlength="2" value="${t.icon}" data-id="${t.id}" data-field="icon" />
      <input class="name-inp" type="text" maxlength="24" value="${esc(t.label)}" data-id="${t.id}" data-field="label" />
      <div class="color-swatches">${PALETTE.map((c, ci) => `
        <div class="swatch${t.accent===c?' selected':''}" style="background:${c}"
          title="${PALETTE_LABELS[ci]}"
          onclick="selectColor('${t.id}','${c}',this)"></div>`).join('')}
      </div>
      <button class="del-btn" onclick="deleteTabRow('${t.id}')" title="Remove tab">×</button>
    </div>`).join('');
}

function selectColor(id, color, el) {
  el.closest('.tab-row-edit').querySelectorAll('.swatch').forEach(s=>s.classList.remove('selected'));
  el.classList.add('selected');
  const t = draft.find(x => x.id === id);
  if (t) t.accent = color;
}

function addTabRow() {
  const newTab = { id: uid(), label: 'New Tab', icon: '⭐', accent: PALETTE[draft.length % PALETTE.length] };
  draft.push(newTab);
  renderTabList();
}

function deleteTabRow(id) {
  if (draft.length <= 1) { alert('You need at least one tab.'); return; }
  const t = draft.find(x => x.id === id);
  if (!confirm(`Remove "${t ? t.label : 'this tab'}"? Its data will be lost if you save.`)) return;
  draft = draft.filter(x => x.id !== id);
  renderTabList();
}

function saveSettings() {
  // flush any unsaved text inputs back into draft before committing
  document.querySelectorAll('.tab-row-edit input[data-id]').forEach(inp => {
    const t = draft.find(x => x.id === inp.dataset.id);
    if (!t) return;
    if (inp.dataset.field === 'icon')  t.icon  = inp.value.trim() || '⭐';
    if (inp.dataset.field === 'label') t.label = inp.value.trim() || 'Tab';
  });

  // figure out which tab ids were removed so we can drop their state
  const removedIds = tabs.map(t=>t.id).filter(id => !draft.find(x=>x.id===id));
  removedIds.forEach(id => delete states[id]);

  // ensure new tabs have empty state
  draft.forEach(t => { if (!states[t.id]) states[t.id] = { count:0, log:[] }; });

  // commit draft -> tabs
  tabs = draft.map(t => Object.assign({}, t));

  // fix activeId if it was removed
  if (!tabs.find(t => t.id === activeId)) activeId = tabs[0].id;

  save();
  closeSettings();
  renderBar();
  renderPanel();
}

/* ── Drag to reorder (operates on draft) ── */
function dragStart(e, i) { dragSrc = i; e.dataTransfer.effectAllowed='move'; }
function dragOver(e, i)  { e.preventDefault(); e.dataTransfer.dropEffect='move'; }
function dragDrop(e, i)  {
  e.preventDefault();
  if (dragSrc===null||dragSrc===i) return;
  const moved = draft.splice(dragSrc,1)[0];
  draft.splice(i,0,moved);
  dragSrc=i;
  renderTabList();
}
function dragEnd() { dragSrc=null; }

/* ── Export / Import ── */
function exportData() {
  const payload = JSON.stringify({ tabs, states }, null, 2);
  const blob = new Blob([payload], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `bean-jar-backup-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showMsg('Backup downloaded! Send it to your new device.', 'ok');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (!d.tabs || !d.states) throw new Error('Invalid format');
      tabs   = d.tabs;
      states = d.states;
      // ensure all tabs have a state entry
      tabs.forEach(t => { if (!states[t.id]) states[t.id] = { count:0, log:[] }; });
      if (!tabs.find(t=>t.id===activeId)) activeId = tabs[0].id;
      save();
      closeSettings();
      renderBar();
      renderPanel();
    } catch(err) {
      showMsg('Could not read file — make sure it\'s a Bean Jar backup.', 'err');
    }
  };
  reader.readAsText(file);
  // reset input so same file can be re-imported if needed
  e.target.value = '';
}

function showMsg(text, type) {
  const el = document.getElementById('transfer-msg');
  if (!el) return;
  el.textContent = text;
  el.className = 'transfer-msg ' + type;
  setTimeout(() => { el.textContent = ''; el.className = 'transfer-msg'; }, 4000);
}

window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>{ renderBar(); renderPanel(); });

load();
renderBar();
renderPanel();
</script>
